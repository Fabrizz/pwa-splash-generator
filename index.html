<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PWA Splash Generator</title>
    <meta name="description" content="Generate all required apple-touch-startup-image splash screens for your PWA. Supports every iPhone and iPad size." />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PWA Splash Generator" />
    <meta property="og:description" content="Generate all apple-touch-startup-image splash screens for your PWA in one click." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PWA Splash Generator" />
    <meta name="twitter:description" content="Generate all apple-touch-startup-image splash screens for your PWA in one click." />

    <!-- PWA / Apple -->
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PWA Splash" />
  </head>

    <script type="module" src="/src/main.tsx"></script>
